## render.yaml
## Ventura Platform — Render deployment blueprint
##
## This file must live at the ROOT of the GitHub repository.
## The repo root should contain: src/, ventura/, package.json, render.yaml etc.
## (i.e. the CONTENTS of the ventura-backend/ folder, not the folder itself)

services:

  # ── Backend API + WebSocket + Cron agent ──────────────────────────────────
  - type: web
    name: ventura-api
    runtime: node
    rootDir: .
    buildCommand: npm install
    startCommand: node src/db/seed.js && node src/server.js
    healthCheckPath: /api/health
    autoDeploy: true
    plan: free

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: AGENT_MODEL
        value: claude-sonnet-4-6
      - key: AGENT_CRON_SCHEDULE
        value: "0 2 * * *"
      - key: DB_PATH
        value: /var/data/ventura.db
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        value: noreply@ventura.ai
      - key: BRAVE_SEARCH_API_KEY
        sync: false
      - key: VERCEL_TOKEN
        sync: false
      - key: PLATFORM_DOMAIN
        value: onrender.com

    disk:
      name: ventura-db
      mountPath: /var/data
      sizeGB: 1

  # ── Frontend — static HTML site ───────────────────────────────────────────
  - type: web
    name: ventura-frontend
    runtime: static
    rootDir: ventura
    buildCommand: ""
    staticPublishPath: .
    autoDeploy: true
    plan: free

    routes:
      - type: rewrite
        source: /*
        destination: /index.html

    headers:
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /config.js
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
